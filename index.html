<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBFI.UZ — Sayt yaratilmoqda</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0a1628;
    --navy-mid: #0f2040;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-pale: #f5e8c0;
    --white: #ffffff;
    --gray: rgba(255,255,255,0.55);
  }

  html, body {
    height: 100%;
    background: var(--navy);
    font-family: 'DM Sans', sans-serif;
    color: var(--white);
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    position: relative;
  }

  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(201,168,76,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.05) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 0;
  }

  .bg-glow {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 0;
    animation: pulse 4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
  }

  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 640px;
    padding: 2rem;
    animation: fadeIn 1.2s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .emblem {
    width: 80px;
    height: 80px;
    margin: 0 auto 2rem;
    border: 1.5px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: spin-border 8s linear infinite;
    position: relative;
  }

  @keyframes spin-border {
    from { box-shadow: 0 0 0 0 rgba(201,168,76,0.4), 0 0 20px rgba(201,168,76,0.15); }
    50%  { box-shadow: 0 0 0 8px rgba(201,168,76,0.0), 0 0 30px rgba(201,168,76,0.3); }
    to   { box-shadow: 0 0 0 0 rgba(201,168,76,0.4), 0 0 20px rgba(201,168,76,0.15); }
  }

  .emblem svg {
    width: 40px;
    height: 40px;
    fill: var(--gold);
  }

  .tagline {
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1rem;
    opacity: 0;
    animation: fadeIn 1s ease 0.4s both;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 5vw, 3.2rem);
    font-weight: 700;
    line-height: 1.15;
    color: var(--white);
    margin-bottom: 0.5rem;
    opacity: 0;
    animation: fadeIn 1s ease 0.6s both;
  }

  h1 span {
    color: var(--gold-light);
  }

  .subtitle {
    font-size: 14px;
    color: var(--gray);
    margin-bottom: 3rem;
    line-height: 1.7;
    opacity: 0;
    animation: fadeIn 1s ease 0.8s both;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: var(--gold);
    margin: 1.5rem auto;
    opacity: 0;
    animation: fadeIn 1s ease 1s both;
  }

  .progress-section {
    opacity: 0;
    animation: fadeIn 1s ease 1.1s both;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--gray);
    margin-bottom: 8px;
  }

  .progress-track {
    width: 100%;
    height: 2px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 2.5rem;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 100%);
    border-radius: 2px;
    width: 0%;
    animation: grow 4s ease 1.5s forwards;
  }

  @keyframes grow {
    0%   { width: 0%; }
    30%  { width: 45%; }
    60%  { width: 72%; }
    85%  { width: 88%; }
    100% { width: 92%; }
  }

  .status-dots {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 3rem;
    opacity: 0;
    animation: fadeIn 1s ease 1.3s both;
  }

  .dot-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--gray);
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
    animation: blink 2s ease-in-out infinite;
  }

  .dot:nth-child(1) { animation-delay: 0s; }
  .dot-item:nth-child(2) .dot { animation-delay: 0.6s; }
  .dot-item:nth-child(3) .dot { animation-delay: 1.2s; }

  @keyframes blink {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  .contact-row {
    display: flex;
    justify-content: center;
    gap: 2rem;
    font-size: 12px;
    color: var(--gray);
    border-top: 0.5px solid rgba(201,168,76,0.2);
    padding-top: 1.5rem;
    opacity: 0;
    animation: fadeIn 1s ease 1.5s both;
  }

  .contact-row a {
    color: var(--gold-light);
    text-decoration: none;
    transition: color 0.2s;
  }
  .contact-row a:hover { color: var(--white); }

  .corner-tl, .corner-tr, .corner-bl, .corner-br {
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: rgba(201,168,76,0.3);
    border-style: solid;
    z-index: 1;
  }
  .corner-tl { top: 20px; left: 20px; border-width: 1px 0 0 1px; }
  .corner-tr { top: 20px; right: 20px; border-width: 1px 1px 0 0; }
  .corner-bl { bottom: 20px; left: 20px; border-width: 0 0 1px 1px; }
  .corner-br { bottom: 20px; right: 20px; border-width: 0 1px 1px 0; }

  .footer-note {
    position: absolute;
    bottom: 14px;
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.1em;
    z-index: 1;
  }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="corner-tl"></div>
<div class="corner-tr"></div>
<div class="corner-bl"></div>
<div class="corner-br"></div>

<div class="content">
  <div class="emblem">
    <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 4L4 12v4h32v-4L20 4zm0 3.2L31.5 13h-23L20 7.2zM6 18v14h4V18H6zm8 0v14h4V18h-4zm8 0v14h4V18h-4zm8 0v14h4V18h-4zM4 34v2h32v-2H4z"/>
    </svg>
  </div>

  <p class="tagline">Institut bank ishi va moliya</p>

  <h1>IBFI<span>.UZ</span></h1>

  <p class="subtitle">
    Yangi sayt yaratilmoqda.<br>
    Tez orada to'liq xizmat ko'rsatish boshlanadi.
  </p>

  <div class="divider"></div>

  <div class="progress-section">
    <div class="progress-label">
      <span>Sayt yaratilmoqda...</span>
      <span id="pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="bar"></div>
    </div>
  </div>

  <div class="status-dots">
    <div class="dot-item"><div class="dot"></div><span>Dizayn</span></div>
    <div class="dot-item"><div class="dot"></div><span>Kontent</span></div>
    <div class="dot-item"><div class="dot"></div><span>Sinovlar</span></div>
  </div>

  <div class="contact-row">
    <span>Toshkent, O'zbekiston</span>
    <a href="mailto:info@ibfi.uz">info@ibfi.uz</a>
    <span>+998 71 000 00 00</span>
  </div>
</div>

<p class="footer-note">© 2025 IBFI.UZ — Barcha huquqlar himoyalangan</p>

<script>
  const bar = document.getElementById('bar');
  const pct = document.getElementById('pct');
  const targets = [0, 45, 72, 88, 92];
  const times  = [0, 1200, 2400, 3400, 4500];
  let i = 0;
  function step() {
    if (i >= targets.length - 1) return;
    const from = targets[i], to = targets[i+1];
    const dur = times[i+1] - times[i];
    const start = performance.now();
    function tick(now) {
      const t = Math.min((now - start) / dur, 1);
      const v = Math.round(from + (to - from) * t);
      pct.textContent = v + '%';
      if (t < 1) requestAnimationFrame(tick);
      else { i++; if (i < targets.length - 1) setTimeout(step, 300); }
    }
    requestAnimationFrame(tick);
  }
  setTimeout(step, 1500);
</script>
</body>
</html>
